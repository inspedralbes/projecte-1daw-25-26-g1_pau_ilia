version: '3.8'

services:
  app:
    build: .
    container_name: gi3p-app
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
    networks:
      - gi3p-network
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: gi3p-db
    restart: always
    environment:
      MYSQL_DATABASE: gi3p_db
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_USER: dev_user
      MYSQL_PASSWORD: dev_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - gi3p-network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: gi3p-pma
    links:
      - db
    environment:
      PMA_HOST: db
      PMA_ARBITRARY: 1
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "8081:80"
    networks:
      - gi3p-network

  mongodb:
    image: mongodb/mongodb-atlas-local
    hostname: mongodb
    environment:
      - MONGODB_INITDB_ROOT_USERNAME=user
      - MONGODB_INITDB_ROOT_PASSWORD=pass
    ports:
      - "27019:27017"  
    networks:         
      - gi3p-network
    volumes:
      - ./init:/docker-entrypoint-initdb.d
      - db:/data/db
      - configdb:/data/configdb
      - mongot:/data/mongot
networks:
  gi3p-network:
    driver: bridge

volumes:
  db_data:
  db:
  configdb:
  mongot: